# Tiny Tapeout project information
project:
  title:      "World-Scan Gaming NPU"      # Your project title
  author:     "Sivaprabha"                # Your name
  discord:    ""                          # Your discord username (optional)
  description: "ASIC-based 4-stage pipeline NPU for real-time gaming texture refinement."
  language:    "Verilog"
  clock_hz:    50000000                   # Target clock frequency (50 MHz)

# How many tiles your design occupies? 1x1 is roughly 160x100um.
  tiles: "1x1" 

# Your top module name must match the Verilog module name exactly.
  top_module: "tt_um_world_scan"

# List your project's source files here. Must be in the /src folder.
  source_files:
    - "project.v"

# Pinout documentation for the datasheet
pinout:
  # Inputs (ui_in)
  ui[0]: "Texture Data [0]"
  ui[1]: "Texture Data [1]"
  ui[2]: "Texture Data [2]"
  ui[3]: "Texture Data [3]"
  ui[4]: "Texture Data [4]"
  ui[5]: "Texture Data [5]"
  ui[6]: "Texture Data [6]"
  ui[7]: "Texture Data [7]"

  # Outputs (uo_out)
  uo[0]: "Refined Pixel [0]"
  uo[1]: "Refined Pixel [1]"
  uo[2]: "Refined Pixel [2]"
  uo[3]: "Refined Pixel [3]"
  uo[4]: "Refined Pixel [4]"
  uo[5]: "Refined Pixel [5]"
  uo[6]: "Refined Pixel [6]"
  uo[7]: "Refined Pixel [7]"

  # Bidirectional (uio_in/out)
  uio[0]: "Status: Power LED"
  uio[1]: "Status: Overflow Flag"
  uio[2]: "Control: AA Enable (Toggle)"
  uio[3]: "Control: Power Sense (Clock Gate)"
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Documentation fields for the website
documentation:
  description: "A specialized NPU designed to offload texture refinement and anti-aliasing tasks from the main GPU."
  how_it_works: "Uses a deterministic 4-stage pipeline (Fetch, Compare, Refine, Smooth) to process 8-bit texture data with zero-jitter latency. Includes a clock-gating mechanism to achieve ultra-high efficiency targets."
  how_to_test:  "Enable 'Power Sense' (uio[3]) and 'AA Enable' (uio[2]). Feed raw pixel data into ui_in and monitor refined output on uo_out."
  external_hw:  "FPGA or Microcontroller to drive texture data and weight synchronization."
  language:     "Verilog"
  doc_link:     ""
  clock_hz:     50000000
  tiles:        "1x1"
